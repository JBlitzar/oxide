<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Oxide Renderer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background: #000;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #info {
        position: fixed;
        top: 10px;
        left: 10px;
        color: #fff;
        font-family: monospace;
        font-size: 14px;
        pointer-events: none;
        text-shadow: 0 0 4px #000;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="info">Loading WASM...</div>
    <script type="module" src="index.js"></script>
  </body>
</html>
